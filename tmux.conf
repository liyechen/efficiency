set -g prefix C-a
unbind C-b

bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R

bind-key C-l select-window -l

set -g display-time 3000
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1

unbind '"'
bind b splitw -v
unbind %
bind v splitw -h

unbind 'c'
bind t new-window

unbind 'p'
bind u previous-window
unbind 'n'
unbind 'i'
bind i next-window

bind -r ^k resizep -U 10
bind -r ^j resizep -D 10
bind -r ^h resizep -L 10
bind -r ^l resizep -R 10

bind ^u swapp -U
bind ^d swapp -D

bind e lastp
bind c killp
bind ^q killw

bind m command-prompt "splitw 'exec man %%'"

# set-option -g status-position top
set-option -g status-position bottom

set-option -g allow-rename off

set -g status on
set -g mouse on

set-option -g status-bg default

set-option -sa terminal-overrides ",xterm:Tc"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

# set -g @catppuccin_flavour 'default'


# run '~/.tmux/plugins/tpm/tpm'



# tmux statuscolors
set -g status-left-length 85
set -g status-left "#[fg=yellow]CURRENT ON#[fg=colour167] #S #[fg=default]- "
set -g window-status-format " #W "
# set -g window-status-current-format "#[fg=black,bold bg=default]│#[fg=white bg=cyan]#W#[fg=black,bold bg=default]│"
set -g window-status-current-format "#[fg=black,bold bg=default]│#[fg=colour167 bg=default]#W#[fg=black,bold bg=default]│"
set -g status-style bg=default
# set -g status-right "#[fg=magenta] #[bg=gray] %b %d %Y %l:%M %p"
set -g status-right '#[fg=white]%H:%M #[fg=yellow]BE HAPPY#[default]'
# set -g status-right '#(gitmux "#{pane_current_path}")'
set -g status-justify left
