set -g prefix C-a
unbind C-b

bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R

bind-key C-l select-window -l
bind-key o display-popup -E -w 70% -h 70% -d "$HOME/Git/codex-monitor" "./codex-monitor --interactive"

set -g display-time 3000
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


unbind '"'
bind b splitw -v
unbind %
bind v splitw -h

unbind 'c'
bind t new-window

unbind 'p'
bind u previous-window
unbind 'n'
unbind 'i'
bind i next-window

bind -r ^k resizep -U 10
bind -r ^j resizep -D 10
bind -r ^h resizep -L 10
bind -r ^l resizep -R 10

bind ^u swapp -U
bind ^d swapp -D

bind e lastp
bind c killp
bind ^q killw

bind m command-prompt "splitw 'exec man %%'"

# set-option -g status-position top
set-option -g status-position bottom

set-option -g allow-rename off

set -g status on
set -g mouse off

set-option -g status-bg default

set-option -sa terminal-overrides ",xterm:Tc"

setw -g mode-keys vi


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

# set -g @catppuccin_flavour 'default'


# run '~/.tmux/plugins/tpm/tpm'

set -g @quote_script "$HOME/.tmux/bin/tmux-session-quote.sh"
set-hook -g after-new-session 'run-shell "#{@quote_script} #{q:session_id}"'
run-shell "#{@quote_script} #{q:session_id}"


# tmux statuscolors
set -g status-left-length 85
set -g status-right-length 220
set -g status-left "#[fg=yellow]CURRENT ON#[fg=colour167] #S #[fg=default]- "
set -g window-status-format " #W "
# set -g window-status-current-format "#[fg=black,bold bg=default]│#[fg=white bg=cyan]#W#[fg=black,bold bg=default]│"
set -g window-status-current-format "#[fg=colour231,bold bg=colour167] #W #[default]"
set -g status-style bg=default
# set -g status-right "#[fg=magenta] #[bg=gray] %b %d %Y %l:%M %p"
set -g status-right '#{?@quote,#[fg=colour244]#{@quote} #[default],}#{?window_zoomed_flag,#[fg=yellow]ZOOM #[default],}#{?pane_in_mode,#[fg=colour167]COPY #[default],}#[fg=yellow]#{?pane_at_top,TOP,#{?pane_at_bottom,BOTTOM,CENTER}}-#{?pane_at_left,LEFT,#{?pane_at_right,RIGHT,CENTER}} #[fg=colour167]#I:#P #[fg=colour245]#{pane_current_command} #[fg=colour245]#{b:pane_current_path} #[fg=white]%H:%M #[fg=yellow]BE HAPPY#[default]'
# set -g status-right '#(gitmux "#{pane_current_path}")'
set -g status-justify left
